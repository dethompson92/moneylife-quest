name: Deploy MoneyLife Quest to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.0
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright smoke test
        run: pnpm run test:e2e
        env:
          VITE_BASE_PATH: /
      - name: Prepare teacher tools password hash
        run: |
          node -e "const crypto=require('node:crypto'); const fs=require('node:fs'); const password=(process.env.TEACHER_TOOLS_PASSWORD || '').trim(); if (password) fs.appendFileSync(process.env.GITHUB_ENV, 'VITE_TEACHER_PASSWORD_HASH=' + crypto.createHash('sha256').update(password).digest('hex') + '\n');"
        env:
          TEACHER_TOOLS_PASSWORD: ${{ secrets.TEACHER_TOOLS_PASSWORD }}
      - name: Build
        run: pnpm run build
        env:
          VITE_GITHUB_ISSUES_URL: ${{ vars.VITE_GITHUB_ISSUES_URL }}
          VITE_SUPPORT_EMAIL: ${{ vars.VITE_SUPPORT_EMAIL }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5.0.0
